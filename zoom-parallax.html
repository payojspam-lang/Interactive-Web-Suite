<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Parallax — Interaction Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
        "@studio-freight/lenis": "https://esm.sh/@studio-freight/lenis@1.0.29"
      }
    }
    </script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background: #000; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        #actions { position: fixed; top: 20px; left: 20px; display: flex; gap: 15px; z-index: 50; }
        .action-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; cursor: pointer; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease; box-sizing: border-box; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        .bg-background { background-color: #000; }
        .text-white { color: #fff; }
    </style>

    <script type="text/javascript">
        window.cn = function(...classes) {
            return classes.filter(Boolean).join(' ');
        };
    </script>
</head>
<body>
    <div id="actions">
        <a href="index.html" class="action-btn">⌂ Home</a>
        <button id="copy-btn" class="action-btn">Copy Component Code</button>
    </div>
    
    <div id="root" class="w-full text-white bg-black"></div>

    <script type="text/babel" data-type="module">
        import React, { useRef, useEffect } from "react";
        import { createRoot } from "react-dom/client";
        import { useScroll, useTransform, motion } from "framer-motion";
        import Lenis from "@studio-freight/lenis";

        const cn = window.cn;

        function ZoomParallax({ images }) {
            const container = useRef(null);
            const { scrollYProgress } = useScroll({
                target: container,
                offset: ['start start', 'end end'],
            });

            const scale4 = useTransform(scrollYProgress, [0, 1], [1, 4]);
            const scale5 = useTransform(scrollYProgress, [0, 1], [1, 5]);
            const scale6 = useTransform(scrollYProgress, [0, 1], [1, 6]);
            const scale8 = useTransform(scrollYProgress, [0, 1], [1, 8]);
            const scale9 = useTransform(scrollYProgress, [0, 1], [1, 9]);

            const scales = [scale4, scale5, scale6, scale5, scale6, scale8, scale9];

            return (
                <div ref={container} className="relative h-[300vh]">
                    <div className="sticky top-0 h-screen overflow-hidden">
                        {images.map(({ src, alt }, index) => {
                            const scale = scales[index % scales.length];

                            return (
                                <motion.div
                                    key={index}
                                    style={{ scale }}
                                    className={`absolute top-0 flex h-full w-full items-center justify-center ${index === 1 ? '[&>div]:!-top-[30vh] [&>div]:!left-[5vw] [&>div]:!h-[30vh] [&>div]:!w-[35vw]' : ''} ${index === 2 ? '[&>div]:!-top-[10vh] [&>div]:!-left-[25vw] [&>div]:!h-[45vh] [&>div]:!w-[20vw]' : ''} ${index === 3 ? '[&>div]:!left-[27.5vw] [&>div]:!h-[25vh] [&>div]:!w-[25vw]' : ''} ${index === 4 ? '[&>div]:!top-[27.5vh] [&>div]:!left-[5vw] [&>div]:!h-[25vh] [&>div]:!w-[20vw]' : ''} ${index === 5 ? '[&>div]:!top-[27.5vh] [&>div]:!-left-[22.5vw] [&>div]:!h-[25vh] [&>div]:!w-[30vw]' : ''} ${index === 6 ? '[&>div]:!top-[22.5vh] [&>div]:!left-[25vw] [&>div]:!h-[15vh] [&>div]:!w-[15vw]' : ''} `}
                                >
                                    <div className="relative h-[25vh] w-[25vw]">
                                        <img
                                            src={src || '/placeholder.svg'}
                                            alt={alt || `Parallax image ${index + 1}`}
                                            className="h-full w-full object-cover"
                                        />
                                    </div>
                                </motion.div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        export default function DefaultDemo() {
            useEffect(() => {
                const lenis = new Lenis()
            
                function raf(time) {
                    lenis.raf(time)
                    requestAnimationFrame(raf)
                }

                requestAnimationFrame(raf)
            },[])

            const images = [
                { src: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1280&h=720&fit=crop&crop=entropy&auto=format&q=80', alt: 'Modern architecture building' },
                { src: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=1280&h=720&fit=crop&crop=entropy&auto=format&q=80', alt: 'Urban cityscape at sunset' },
                { src: 'https://images.unsplash.com/photo-1557683316-973673baf926?w=800&h=800&fit=crop&crop=entropy&auto=format&q=80', alt: 'Abstract geometric pattern' },
                { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1280&h=720&fit=crop&crop=entropy&auto=format&q=80', alt: 'Mountain landscape' },
                { src: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&h=800&fit=crop&crop=entropy&auto=format&q=80', alt: 'Minimalist design elements' },
                { src: 'https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=1280&h=720&fit=crop&crop=entropy&auto=format&q=80', alt: 'Ocean waves and beach' },
                { src: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1280&h=720&fit=crop&crop=entropy&auto=format&q=80', alt: 'Forest trees and sunlight' },
            ];

            return (
                <main className="min-h-screen w-full bg-[#000]">
                    <div className="relative flex h-[50vh] items-center justify-center">
                        <div
                            aria-hidden="true"
                            className={cn(
                                'pointer-events-none absolute -top-1/2 left-1/2 h-[120vmin] w-[120vmin] -translate-x-1/2 rounded-full',
                                'bg-[radial-gradient(ellipse_at_center,rgba(255,255,255,0.1),transparent_50%)]',
                                'blur-[30px]'
                            )}
                        />
                        <h1 className="text-center text-4xl font-bold">
                            Scroll Down for Zoom Parallax
                        </h1>
                    </div>
                    <ZoomParallax images={images} />
                    <div className="h-[50vh]"/>
                </main>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DefaultDemo />);
        
        document.getElementById('copy-btn').addEventListener('click', () => {
            const btn = document.getElementById('copy-btn');
            fetch('components/ui/zoom-parallax.tsx').then(r => r.text()).then(code => {
                navigator.clipboard.writeText(code);
                btn.textContent = 'Copied Component!';
                setTimeout(() => btn.textContent = 'Copy Component Code', 2000);
            }).catch(e => {
                btn.textContent = 'Failed';
            });
        });

    </script>
</body>
</html>
