<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fiber Gallery — Interaction Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?deps=three@0.160.0,react@18.2.0,react-dom@18.2.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?deps=three@0.160.0,react@18.2.0,react-dom@18.2.0",
        "framer-motion": "https://esm.sh/framer-motion@11?deps=react@18.2.0,react-dom@18.2.0",
        "https://esm.sh/framer-motion@11.0.8/react?deps=react@18.2.0,react-dom@18.2.0": "https://esm.sh/framer-motion@11?deps=react@18.2.0,react-dom@18.2.0",
        "@/components/ui/3d-gallery-photography": "./components/ui/3d-gallery-photography.tsx"
      }
    }
    </script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        #actions { position: fixed; top: 20px; left: 20px; display: flex; gap: 15px; z-index: 50; }
        .action-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; cursor: pointer; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease; box-sizing: border-box; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        .bg-background { background-color: #000; }
        .text-white { color: #fff; }
    </style>
</head>
<body class="dark bg-black">
    <div id="actions">
        <a href="index.html" class="action-btn">⌂ Home</a>
        <button id="copy-btn" class="action-btn">Copy Component Code</button>
    </div>
    
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useRef, useMemo, useCallback, useState, useEffect } from "react";
        import { createRoot } from "react-dom/client";
        import { Canvas, useFrame, useThree } from '@react-three/fiber';
        import { useTexture } from '@react-three/drei';
        import * as THREE from 'three';

        // NOTE: Because React Three Fiber internally accesses react contexts tightly bound 
        // to module execution, direct browser transpilation sometimes throws reconciler errors 
        // with pure esm.sh unless bundled. If the canvas rendering fails here via direct HTML compilation, 
        // standard build setups (Vite/Next.js) natively compile it smoothly.
        
        const DEFAULT_DEPTH_RANGE = 50;
        const MAX_HORIZONTAL_OFFSET = 8;
        const MAX_VERTICAL_OFFSET = 8;

        const createClothMaterial = () => {
            return new THREE.ShaderMaterial({
                transparent: true,
                uniforms: {
                    map: { value: null },
                    opacity: { value: 1.0 },
                    blurAmount: { value: 0.0 },
                    scrollForce: { value: 0.0 },
                    time: { value: 0.0 },
                    isHovered: { value: 0.0 },
                },
                vertexShader: `
            uniform float scrollForce;
            uniform float time;
            uniform float isHovered;
            varying vec2 vUv;
            varying vec3 vNormal;
            
            void main() {
                vUv = uv;
                vNormal = normal;
                vec3 pos = position;
                
                float curveIntensity = scrollForce * 0.3;
                float distanceFromCenter = length(pos.xy);
                float curve = distanceFromCenter * distanceFromCenter * curveIntensity;
                
                float ripple1 = sin(pos.x * 2.0 + scrollForce * 3.0) * 0.02;
                float ripple2 = sin(pos.y * 2.5 + scrollForce * 2.0) * 0.015;
                float clothEffect = (ripple1 + ripple2) * abs(curveIntensity) * 2.0;
                
                float flagWave = 0.0;
                if (isHovered > 0.5) {
                float wavePhase = pos.x * 3.0 + time * 8.0;
                float waveAmplitude = sin(wavePhase) * 0.1;
                float dampening = smoothstep(-0.5, 0.5, pos.x);
                flagWave = waveAmplitude * dampening;
                
                float secondaryWave = sin(pos.x * 5.0 + time * 12.0) * 0.03 * dampening;
                flagWave += secondaryWave;
                }
                
                pos.z -= (curve + clothEffect + flagWave);
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
            `,
                fragmentShader: `
            uniform sampler2D map;
            uniform float opacity;
            uniform float blurAmount;
            uniform float scrollForce;
            varying vec2 vUv;
            varying vec3 vNormal;
            
            void main() {
                vec4 color = texture2D(map, vUv);
                
                // Simple blur
                if (blurAmount > 0.0) {
                vec2 texelSize = 1.0 / vec2(textureSize(map, 0));
                vec4 blurred = vec4(0.0);
                float total = 0.0;
                
                for (float x = -2.0; x <= 2.0; x += 1.0) {
                    for (float y = -2.0; y <= 2.0; y += 1.0) {
                    vec2 offset = vec2(x, y) * texelSize * blurAmount;
                    float weight = 1.0 / (1.0 + length(vec2(x, y)));
                    blurred += texture2D(map, vUv + offset) * weight;
                    total += weight;
                    }
                }
                color = blurred / total;
                }
                
                float curveHighlight = abs(scrollForce) * 0.05;
                color.rgb += vec3(curveHighlight * 0.1);
                
                gl_FragColor = vec4(color.rgb, color.a * opacity);
            }
            `,
            });
        };

        function ImagePlane({ texture, position, scale, material }) {
            const meshRef = useRef(null);
            const [isHovered, setIsHovered] = useState(false);

            useEffect(() => {
                if (material && texture) {
                    material.uniforms.map.value = texture;
                }
            }, [material, texture]);

            useEffect(() => {
                if (material && material.uniforms) {
                    material.uniforms.isHovered.value = isHovered ? 1.0 : 0.0;
                }
            }, [material, isHovered]);

            return (
                <mesh
                    ref={meshRef}
                    position={position}
                    scale={scale}
                    material={material}
                    onPointerEnter={() => setIsHovered(true)}
                    onPointerLeave={() => setIsHovered(false)}
                >
                    <planeGeometry args={[1, 1, 32, 32]} />
                </mesh>
            );
        }

        function GalleryScene({
            images,
            speed = 1,
            visibleCount = 8,
            fadeSettings = { fadeIn: { start: 0.05, end: 0.15 }, fadeOut: { start: 0.85, end: 0.95 } },
            blurSettings = { blurIn: { start: 0.0, end: 0.1 }, blurOut: { start: 0.9, end: 1.0 }, maxBlur: 3.0 },
        }) {
            const [scrollVelocity, setScrollVelocity] = useState(0);
            const [autoPlay, setAutoPlay] = useState(true);
            const lastInteraction = useRef(Date.now());

            const normalizedImages = useMemo(() => images.map((img) => typeof img === 'string' ? { src: img, alt: '' } : img), [images]);
            const textures = useTexture(normalizedImages.map((img) => img.src));
            const materials = useMemo(() => Array.from({ length: visibleCount }, () => createClothMaterial()), [visibleCount]);

            const spatialPositions = useMemo(() => {
                const positions = [];
                const maxHorizontalOffset = MAX_HORIZONTAL_OFFSET;
                const maxVerticalOffset = MAX_VERTICAL_OFFSET;

                for (let i = 0; i < visibleCount; i++) {
                    const horizontalAngle = (i * 2.618) % (Math.PI * 2); 
                    const verticalAngle = (i * 1.618 + Math.PI / 3) % (Math.PI * 2); 
                    const horizontalRadius = (i % 3) * 1.2; 
                    const verticalRadius = ((i + 1) % 4) * 0.8; 

                    const x = (Math.sin(horizontalAngle) * horizontalRadius * maxHorizontalOffset) / 3;
                    const y = (Math.cos(verticalAngle) * verticalRadius * maxVerticalOffset) / 4;
                    positions.push({ x, y });
                }
                return positions;
            }, [visibleCount]);

            const totalImages = normalizedImages.length;
            const depthRange = DEFAULT_DEPTH_RANGE;

            const planesData = useRef(
                Array.from({ length: visibleCount }, (_, i) => ({
                    index: i,
                    z: visibleCount > 0 ? ((depthRange / visibleCount) * i) % depthRange : 0,
                    imageIndex: totalImages > 0 ? i % totalImages : 0,
                    x: spatialPositions[i]?.x ?? 0, 
                    y: spatialPositions[i]?.y ?? 0, 
                }))
            );

            const handleWheel = useCallback((event) => {
                event.preventDefault();
                setScrollVelocity((prev) => prev + event.deltaY * 0.01 * speed);
                setAutoPlay(false);
                lastInteraction.current = Date.now();
            }, [speed]);

            const handleKeyDown = useCallback((event) => {
                if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
                    setScrollVelocity((prev) => prev - 2 * speed);
                    setAutoPlay(false);
                    lastInteraction.current = Date.now();
                } else if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
                    setScrollVelocity((prev) => prev + 2 * speed);
                    setAutoPlay(false);
                    lastInteraction.current = Date.now();
                }
            }, [speed]);

            useEffect(() => {
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    canvas.addEventListener('wheel', handleWheel, { passive: false });
                    document.addEventListener('keydown', handleKeyDown);
                    return () => {
                        canvas.removeEventListener('wheel', handleWheel);
                        document.removeEventListener('keydown', handleKeyDown);
                    };
                }
            }, [handleWheel, handleKeyDown]);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (Date.now() - lastInteraction.current > 3000) {
                        setAutoPlay(true);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            useFrame((state, delta) => {
                if (autoPlay) setScrollVelocity((prev) => prev + 0.3 * delta);
                setScrollVelocity((prev) => prev * 0.95);

                const time = state.clock.getElapsedTime();
                materials.forEach((material) => {
                    if (material && material.uniforms) {
                        material.uniforms.time.value = time;
                        material.uniforms.scrollForce.value = scrollVelocity;
                    }
                });

                const imageAdvance = totalImages > 0 ? visibleCount % totalImages || totalImages : 0;
                const totalRange = depthRange;
                const halfRange = totalRange / 2;

                planesData.current.forEach((plane, i) => {
                    let newZ = plane.z + scrollVelocity * delta * 10;
                    let wrapsForward = 0;
                    let wrapsBackward = 0;

                    if (newZ >= totalRange) {
                        wrapsForward = Math.floor(newZ / totalRange);
                        newZ -= totalRange * wrapsForward;
                    } else if (newZ < 0) {
                        wrapsBackward = Math.ceil(-newZ / totalRange);
                        newZ += totalRange * wrapsBackward;
                    }

                    if (wrapsForward > 0 && imageAdvance > 0 && totalImages > 0) {
                        plane.imageIndex = (plane.imageIndex + wrapsForward * imageAdvance) % totalImages;
                    }
                    if (wrapsBackward > 0 && imageAdvance > 0 && totalImages > 0) {
                        const step = plane.imageIndex - wrapsBackward * imageAdvance;
                        plane.imageIndex = ((step % totalImages) + totalImages) % totalImages;
                    }

                    plane.z = ((newZ % totalRange) + totalRange) % totalRange;
                    plane.x = spatialPositions[i]?.x ?? 0;
                    plane.y = spatialPositions[i]?.y ?? 0;

                    const normalizedPosition = plane.z / totalRange; 
                    let opacity = 1;

                    if (normalizedPosition >= fadeSettings.fadeIn.start && normalizedPosition <= fadeSettings.fadeIn.end) {
                        opacity = (normalizedPosition - fadeSettings.fadeIn.start) / (fadeSettings.fadeIn.end - fadeSettings.fadeIn.start);
                    } else if (normalizedPosition < fadeSettings.fadeIn.start) {
                        opacity = 0;
                    } else if (normalizedPosition >= fadeSettings.fadeOut.start && normalizedPosition <= fadeSettings.fadeOut.end) {
                        opacity = 1 - (normalizedPosition - fadeSettings.fadeOut.start) / (fadeSettings.fadeOut.end - fadeSettings.fadeOut.start);
                    } else if (normalizedPosition > fadeSettings.fadeOut.end) {
                        opacity = 0;
                    }
                    opacity = Math.max(0, Math.min(1, opacity));

                    let blur = 0;
                    if (normalizedPosition >= blurSettings.blurIn.start && normalizedPosition <= blurSettings.blurIn.end) {
                        blur = blurSettings.maxBlur * (1 - (normalizedPosition - blurSettings.blurIn.start) / (blurSettings.blurIn.end - blurSettings.blurIn.start));
                    } else if (normalizedPosition < blurSettings.blurIn.start) {
                        blur = blurSettings.maxBlur;
                    } else if (normalizedPosition >= blurSettings.blurOut.start && normalizedPosition <= blurSettings.blurOut.end) {
                        blur = blurSettings.maxBlur * ((normalizedPosition - blurSettings.blurOut.start) / (blurSettings.blurOut.end - blurSettings.blurOut.start));
                    } else if (normalizedPosition > blurSettings.blurOut.end) {
                        blur = blurSettings.maxBlur;
                    }
                    blur = Math.max(0, Math.min(blurSettings.maxBlur, blur));

                    const material = materials[i];
                    if (material && material.uniforms) {
                        material.uniforms.opacity.value = opacity;
                        material.uniforms.blurAmount.value = blur;
                    }
                });
            });

            if (normalizedImages.length === 0) return null;

            return (
                <React.Fragment>
                    {planesData.current.map((plane, i) => {
                        const texture = textures[plane.imageIndex];
                        const material = materials[i];
                        if (!texture || !material) return null;
                        const worldZ = plane.z - depthRange / 2;
                        const aspect = texture.image ? texture.image.width / texture.image.height : 1;
                        const scale = aspect > 1 ? [2 * aspect, 2, 1] : [2, 2 / aspect, 1];
                        return (
                            <ImagePlane key={plane.index} texture={texture} position={[plane.x, plane.y, worldZ]} scale={scale} material={material} />
                        );
                    })}
                </React.Fragment>
            );
        }

        function DemoOne() {
            const sampleImages = [
                { src: 'https://images.unsplash.com/photo-1741332966416-414d8a5b8887?w=600&auto=format&fit=crop&q=60', alt: 'Image 1' },
                { src: 'https://images.unsplash.com/photo-1754769440490-2eb64d715775?q=80&w=1113&auto=format&fit=crop', alt: 'Image 2' },
                { src: 'https://images.unsplash.com/photo-1758640920659-0bb864175983?w=600&auto=format&fit=crop&q=60', alt: 'Image 3' },
                { src: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=1280&h=720&fit=crop', alt: 'Image 4' },
                { src: 'https://images.unsplash.com/photo-1746023841657-e5cd7cc90d2c?w=600&auto=format&fit=crop&q=60', alt: 'Image 5' },
                { src: 'https://images.unsplash.com/photo-1741715661559-6149723ea89a?w=600&auto=format&fit=crop&q=60', alt: 'Image 6' },
                { src: 'https://images.unsplash.com/photo-1725878746053-407492aa4034?w=600&auto=format&fit=crop&q=60', alt: 'Image 7' },
                { src: 'https://images.unsplash.com/photo-1752588975168-d2d7965a6d64?w=600&auto=format&fit=crop&q=60', alt: 'Image 8' },
            ];

            return (
                <main className="min-h-screen h-full w-full bg-black">
                    <div className="h-screen w-full overflow-hidden">
                        <Canvas camera={{ position: [0, 0, 0], fov: 55 }} gl={{ antialias: true, alpha: true }}>
                            <React.Suspense fallback={null}>
                                <GalleryScene images={sampleImages} speed={1.2} visibleCount={12} fadeSettings={{ fadeIn: { start: 0.05, end: 0.25 }, fadeOut: { start: 0.4, end: 0.43 } }} blurSettings={{ blurIn: { start: 0.0, end: 0.1 }, blurOut: { start: 0.4, end: 0.43 }, maxBlur: 8.0 }} />
                            </React.Suspense>
                        </Canvas>
                    </div>
                    <div className="h-screen inset-0 pointer-events-none absolute flex items-center justify-center text-center px-3 text-white">
                        <h1 className="font-serif text-4xl md:text-7xl tracking-tight font-bold drop-shadow-xl select-none mix-blend-difference">
                            <span className="italic font-normal">G A L L E R Y</span>
                        </h1>
                    </div>

                    <div className="text-center absolute bottom-10 left-0 right-0 font-mono text-[11px] font-semibold text-white/50 py-2 pointer-events-none">
                        <p>Use mouse wheel, arrow keys, or touch to navigate</p>
                    </div>
                </main>
            );
        }

        // Error boundary hook for React Three Fiber modules directly in browser
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, message: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, message: error.toString() }; }
            render() {
                if (this.state.hasError) return <div className="text-white p-10 font-mono">React Three Fiber requires a bundler like Vite/Next.js to resolve node module dependency graphs correctly. Please copy the component code and run inside a Node environment. Error: {this.state.message}</div>;
                return this.props.children;
            }
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><DemoOne /></ErrorBoundary>);
        
        document.getElementById('copy-btn').addEventListener('click', () => {
            const btn = document.getElementById('copy-btn');
            fetch('components/ui/3d-gallery-photography.tsx').then(r => r.text()).then(code => {
                navigator.clipboard.writeText(code);
                btn.textContent = 'Copied Component!';
                setTimeout(() => btn.textContent = 'Copy Component Code', 2000);
            }).catch(e => {
                btn.textContent = 'Failed';
            });
        });

    </script>
</body>
</html>
