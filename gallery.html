<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gallery — Interactive Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .overlay h1 { font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; letter-spacing: 0.5em; text-transform: uppercase; color: white; mix-blend-mode: difference; user-select: none; }
        .nav { position: fixed; top: 20px; left: 20px; z-index: 50; display: flex; gap: 15px; }
        .nav a { padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
        .hint { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; font-size: 11px; font-family: monospace; color: rgba(255,255,255,0.35); pointer-events: none; z-index: 10; letter-spacing: 0.1em; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/">← Back to Hub</a>
</div>

<div class="overlay">
    <h1>Gallery</h1>
</div>

<div class="hint">Use mouse wheel or arrow keys to navigate</div>

<script src="https://esm.sh/three@0.160.0/build/three.module.js" type="module"></script>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';

// --- Configuration ---
const IMAGES = [
    'https://images.unsplash.com/photo-1741332966416-414d8a5b8887?w=600&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=800&h=500&fit=crop',
    'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=800&h=500&fit=crop',
    'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&h=500&fit=crop',
    'https://images.unsplash.com/photo-1618477247222-acaff2c6a463?w=800&h=500&fit=crop',
    'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&h=500&fit=crop',
    'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=800&h=500&fit=crop',
    'https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?w=800&h=500&fit=crop',
];

const VISIBLE_COUNT = 10;
const DEPTH_RANGE = 50;
const SPEED = 1.2;

// --- Three.js Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
document.body.prepend(renderer.domElement);

// --- Load Textures ---
const textureLoader = new THREE.TextureLoader();
textureLoader.crossOrigin = 'anonymous';

const textures = [];
let texturesLoaded = 0;

function onAllTexturesLoaded() {
    initPlanes();
    animate();
}

IMAGES.forEach((url, i) => {
    textureLoader.load(url, (tex) => {
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        textures[i] = tex;
        texturesLoaded++;
        if (texturesLoaded === IMAGES.length) onAllTexturesLoaded();
    }, undefined, () => {
        // On error, create a fallback colored texture
        const canvas = document.createElement('canvas');
        canvas.width = 400; canvas.height = 300;
        const ctx = canvas.getContext('2d');
        const hue = (i * 45) % 360;
        ctx.fillStyle = `hsl(${hue}, 50%, 20%)`;
        ctx.fillRect(0, 0, 400, 300);
        ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
        ctx.font = 'bold 40px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`Image ${i + 1}`, 200, 160);
        textures[i] = new THREE.CanvasTexture(canvas);
        texturesLoaded++;
        if (texturesLoaded === IMAGES.length) onAllTexturesLoaded();
    });
});

// --- Custom Shader Material ---
function createImageMaterial() {
    return new THREE.ShaderMaterial({
        transparent: true,
        uniforms: {
            map: { value: null },
            opacity: { value: 1.0 },
            time: { value: 0.0 },
            scrollForce: { value: 0.0 },
        },
        vertexShader: `
            uniform float scrollForce;
            uniform float time;
            varying vec2 vUv;
            
            void main() {
                vUv = uv;
                vec3 pos = position;
                
                // Cloth-like curving when scrolling
                float curveIntensity = scrollForce * 0.25;
                float dist = length(pos.xy);
                float curve = dist * dist * curveIntensity;
                
                float ripple = sin(pos.x * 2.5 + scrollForce * 3.0) * 0.015 * abs(curveIntensity);
                pos.z -= (curve + ripple);
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D map;
            uniform float opacity;
            varying vec2 vUv;
            
            void main() {
                vec4 color = texture2D(map, vUv);
                gl_FragColor = vec4(color.rgb, color.a * opacity);
            }
        `,
    });
}

// --- Planes Data ---
const planes = [];
const meshes = [];

// Spatial positions (staggered arrangement)
function getSpatialPos(i) {
    const ha = (i * 2.618) % (Math.PI * 2);
    const va = (i * 1.618 + Math.PI / 3) % (Math.PI * 2);
    const hr = (i % 3) * 1.2;
    const vr = ((i + 1) % 4) * 0.8;
    return {
        x: (Math.sin(ha) * hr * 8) / 3,
        y: (Math.cos(va) * vr * 8) / 4,
    };
}

function initPlanes() {
    for (let i = 0; i < VISIBLE_COUNT; i++) {
        const sp = getSpatialPos(i);
        const planeData = {
            index: i,
            z: (DEPTH_RANGE / VISIBLE_COUNT) * i,
            imageIndex: i % IMAGES.length,
            x: sp.x,
            y: sp.y,
        };
        planes.push(planeData);

        const material = createImageMaterial();
        const tex = textures[planeData.imageIndex];
        material.uniforms.map.value = tex;
        
        const aspect = tex.image ? tex.image.width / tex.image.height : 1.5;
        const geo = new THREE.PlaneGeometry(1, 1, 32, 32);
        const mesh = new THREE.Mesh(geo, material);
        mesh.scale.set(aspect > 1 ? 2.5 * aspect : 2.5, aspect > 1 ? 2.5 : 2.5 / aspect, 1);
        
        scene.add(mesh);
        meshes.push(mesh);
    }
}

// --- Scroll / Input ---
let scrollVelocity = 0;
let autoPlay = true;
let lastInteraction = Date.now();

window.addEventListener('wheel', (e) => {
    e.preventDefault();
    scrollVelocity += e.deltaY * 0.008 * SPEED;
    autoPlay = false;
    lastInteraction = Date.now();
}, { passive: false });

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        scrollVelocity -= 1.5 * SPEED;
        autoPlay = false;
        lastInteraction = Date.now();
    } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        scrollVelocity += 1.5 * SPEED;
        autoPlay = false;
        lastInteraction = Date.now();
    }
});

// Auto-resume after 3s inactivity
setInterval(() => {
    if (Date.now() - lastInteraction > 3000) autoPlay = true;
}, 1000);

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    
    // Auto-scroll
    if (autoPlay) scrollVelocity += 0.25 * delta;
    
    // Damping
    scrollVelocity *= 0.96;
    
    const totalImages = IMAGES.length;
    const imageAdvance = VISIBLE_COUNT % totalImages || totalImages;
    const halfRange = DEPTH_RANGE / 2;

    planes.forEach((plane, i) => {
        let newZ = plane.z + scrollVelocity * delta * 10;
        let wrapsForward = 0, wrapsBackward = 0;

        if (newZ >= DEPTH_RANGE) {
            wrapsForward = Math.floor(newZ / DEPTH_RANGE);
            newZ -= DEPTH_RANGE * wrapsForward;
        } else if (newZ < 0) {
            wrapsBackward = Math.ceil(-newZ / DEPTH_RANGE);
            newZ += DEPTH_RANGE * wrapsBackward;
        }

        if (wrapsForward > 0) plane.imageIndex = (plane.imageIndex + wrapsForward * imageAdvance) % totalImages;
        if (wrapsBackward > 0) {
            const step = plane.imageIndex - wrapsBackward * imageAdvance;
            plane.imageIndex = ((step % totalImages) + totalImages) % totalImages;
        }

        plane.z = ((newZ % DEPTH_RANGE) + DEPTH_RANGE) % DEPTH_RANGE;

        // Update mesh position
        const worldZ = plane.z - halfRange;
        const mesh = meshes[i];
        mesh.position.set(plane.x, plane.y, worldZ);

        // Update texture
        const mat = mesh.material;
        mat.uniforms.map.value = textures[plane.imageIndex];
        mat.uniforms.time.value = elapsed;
        mat.uniforms.scrollForce.value = scrollVelocity;

        // Fade in/out based on depth
        const norm = plane.z / DEPTH_RANGE;
        let opacity = 1;
        if (norm < 0.1) opacity = norm / 0.1;
        else if (norm > 0.85) opacity = (1 - norm) / 0.15;
        opacity = Math.max(0, Math.min(1, opacity));
        mat.uniforms.opacity.value = opacity;

        // Update texture aspect
        const tex = textures[plane.imageIndex];
        if (tex && tex.image) {
            const aspect = tex.image.width / tex.image.height;
            mesh.scale.set(aspect > 1 ? 2.5 * aspect : 2.5, aspect > 1 ? 2.5 : 2.5 / aspect, 1);
        }
    });

    renderer.render(scene, camera);
}
</script>
</body>
</html>
