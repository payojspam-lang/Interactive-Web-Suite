<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Timeline - Interactive Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        border: "hsl(var(--border))",
                        primary: "hsl(var(--primary))",
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        :root {
            --background: 0 0% 0%;
            --foreground: 0 0% 98%;
            --primary: 217.2 91.2% 59.8%;
        }
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; margin: 0; min-height: 100vh; overflow: hidden; }
        
        .interactive-nav {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 50;
            display: flex;
            gap: 1rem;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.1?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased w-full text-white bg-black">

<div class="interactive-nav">
    <a href="/" class="nav-btn">← Back to Hub</a>
</div>

<div id="root" class="w-full min-h-screen"></div>

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef, useCallback } from "react";
import { createRoot } from "react-dom/client";
import { motion, AnimatePresence } from "framer-motion";

const milestones = [
  { year: "2018", title: "Foundation", desc: "Interactive Suite engine built from scratch over 4 intensive weeks of development.", color: "#3b82f6" },
  { year: "2019", title: "Scale", desc: "Raised $2M seed. Deployed infrastructure globally across 12 regions.", color: "#a855f7" },
  { year: "2020", title: "v2.0", desc: "Pivoted architecture to entirely edge-based compute nodes for ultra-low latency.", color: "#10b981" },
  { year: "2021", title: "Growth", desc: "1,000,000 active developers building and integrating components daily.", color: "#f97316" },
  { year: "2022", title: "Acquisition", desc: "Joined the ecosystem to provide native interactive tools as a standard.", color: "#ec4899" },
  { year: "2023", title: "IPO Prep", desc: "Solidified market dominance in the UI interaction space globally.", color: "#6366f1" }
];

function RadialOrbitalTimeline() {
  const [activeIndex, setActiveIndex] = useState(null);
  const [rotation, setRotation] = useState(0);
  const animRef = useRef(null);
  const isPausedRef = useRef(false);

  // Manual rotation animation loop
  useEffect(() => {
    let lastTime = performance.now();
    
    const animate = (time) => {
      const dt = (time - lastTime) / 1000;
      lastTime = time;
      
      if (!isPausedRef.current) {
        setRotation(prev => (prev + dt * 9) % 360); // 9 degrees/second = 40s full rotation
      }
      
      animRef.current = requestAnimationFrame(animate);
    };
    
    animRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  const handleHover = useCallback((index) => {
    setActiveIndex(index);
    isPausedRef.current = true;
  }, []);

  const handleLeave = useCallback(() => {
    setActiveIndex(null);
    isPausedRef.current = false;
  }, []);

  const radius = 250;
  const totalItems = milestones.length;

  return (
    <div className="w-full min-h-screen flex items-center justify-center relative overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black">
      
      {/* Background grid */}
      <div className="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>

      <div className="relative flex items-center justify-center" style={{ width: '600px', height: '600px' }}>
        
        {/* Core central element */}
        <div className="absolute z-10 w-36 h-36 rounded-full bg-neutral-900 border border-white/10 shadow-[0_0_80px_rgba(59,130,246,0.25)] flex items-center justify-center flex-col overflow-hidden">
           <div className="absolute inset-0 bg-gradient-to-tr from-blue-500/20 to-purple-500/20 animate-pulse"></div>
           <h1 className="text-xl font-black z-10 tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white to-neutral-400">EPOCH</h1>
           <p className="text-[10px] text-neutral-500 z-10 mt-1 uppercase tracking-widest font-semibold" style={{ fontFamily: "'Space Mono', monospace" }}>TIMELINE</p>
        </div>

        {/* Orbit Rings */}
        <div className="absolute rounded-full border border-white/[0.06]" style={{ width: `${radius*2}px`, height: `${radius*2}px` }}></div>
        <div className="absolute rounded-full border border-dashed border-white/[0.04]" style={{ width: `${radius*2 + 80}px`, height: `${radius*2 + 80}px`, animation: 'spin 80s linear infinite' }}></div>

        {/* Orbital nodes */}
        {milestones.map((item, index) => {
          const angle = ((index / totalItems) * 360 + rotation) * (Math.PI / 180);
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          const isActive = activeIndex === index;

          return (
            <div 
              key={index}
              className="absolute z-20"
              style={{
                transform: `translate(${x}px, ${y}px)`,
                transition: isPausedRef.current ? 'none' : undefined,
              }}
            >
              <div 
                className="relative cursor-pointer group"
                onMouseEnter={() => handleHover(index)}
                onMouseLeave={handleLeave}
              >
                {/* Pulse ring */}
                {isActive && (
                  <div 
                    className="absolute inset-0 rounded-full"
                    style={{ 
                      backgroundColor: item.color, 
                      animation: 'pulse-ring 1.5s ease-out infinite',
                      width: '32px', height: '32px',
                      top: '-8px', left: '-8px',
                    }}
                  ></div>
                )}

                {/* Node dot */}
                <div 
                  className="w-4 h-4 rounded-full border-2 border-black relative z-10 flex items-center justify-center transition-transform duration-300"
                  style={{ 
                    backgroundColor: item.color, 
                    boxShadow: `0 0 20px ${item.color}80`,
                    transform: isActive ? 'scale(2)' : 'scale(1)',
                  }}
                >
                  <div className="w-1 h-1 rounded-full bg-white/80"></div>
                </div>
                
                {/* Always-visible year label */}
                <div 
                  className="absolute left-1/2 -translate-x-1/2 px-2 py-0.5 rounded whitespace-nowrap transition-all duration-300"
                  style={{ 
                    top: isActive ? '-32px' : '20px',
                    opacity: 1,
                    fontFamily: "'Space Mono', monospace",
                  }}
                >
                  <span className="text-[11px] font-bold text-white/70">{item.year}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      
      {/* Detail panel */}
      <AnimatePresence>
          {activeIndex !== null && (
              <motion.div
                  initial={{ opacity: 0, y: 20, scale: 0.95 }}
                  animate={{ opacity: 1, y: 0, scale: 1 }}
                  exit={{ opacity: 0, y: 10, scale: 0.95 }}
                  transition={{ duration: 0.25 }}
                  className="absolute bottom-12 left-1/2 -translate-x-1/2 max-w-md w-[90%] bg-neutral-900/95 border border-white/10 p-6 rounded-2xl shadow-2xl backdrop-blur-xl z-50 text-center"
              >
                  <div className="flex items-center justify-center gap-3 mb-3">
                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: milestones[activeIndex].color }}></div>
                    <span className="text-xs font-bold tracking-widest text-white/60 uppercase" style={{ fontFamily: "'Space Mono', monospace" }}>{milestones[activeIndex].year}</span>
                  </div>
                  <h3 className="text-2xl font-bold mb-2">{milestones[activeIndex].title}</h3>
                  <p className="text-neutral-400 leading-relaxed text-sm">{milestones[activeIndex].desc}</p>
              </motion.div>
          )}
      </AnimatePresence>

    </div>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(<RadialOrbitalTimeline />);
</script>
</body>
</html>
