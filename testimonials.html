<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials Columns — Interaction Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@11?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
    </script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        #actions { position: absolute; top: 20px; left: 20px; display: flex; gap: 15px; z-index: 50; }
        .action-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; cursor: pointer; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease; box-sizing: border-box; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        .bg-background { background-color: #000; }
        .text-white { color: #fff; }
        .border-white\/20 { border-color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <div id="actions">
        <a href="index.html" class="action-btn">⌂ Home</a>
        <button id="copy-btn" class="action-btn">Copy Component Code</button>
    </div>
    
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel" data-type="module">
        import React from "react";
        import { createRoot } from "react-dom/client";
        import { motion } from "framer-motion";

        const TestimonialsColumn = (props) => {
            return (
                <div className={props.className}>
                <motion.div
                    animate={{
                    translateY: "-50%",
                    }}
                    transition={{
                    duration: props.duration || 10,
                    repeat: Infinity,
                    ease: "linear",
                    repeatType: "loop",
                    }}
                    className="flex flex-col gap-6 pb-6 bg-background"
                >
                    {[
                    ...new Array(2).fill(0).map((_, index) => (
                        <React.Fragment key={index}>
                        {props.testimonials.map(({ text, image, name, role }, i) => (
                            <div className="p-8 rounded-3xl border border-white/10 shadow-lg shadow-primary/10 max-w-xs w-full bg-white/5" key={i}>
                            <div className="text-sm opacity-90 leading-relaxed">{text}</div>
                            <div className="flex items-center gap-4 mt-6">
                                <img
                                width={40}
                                height={40}
                                src={image}
                                alt={name}
                                className="h-10 w-10 rounded-full object-cover"
                                />
                                <div className="flex flex-col">
                                <div className="font-medium tracking-tight leading-5">{name}</div>
                                <div className="text-xs opacity-60 tracking-tight mt-1">{role}</div>
                                </div>
                            </div>
                            </div>
                        ))}
                        </React.Fragment>
                    )),
                    ]}
                </motion.div>
                </div>
            );
        };

        const testimonials = [
            { text: "This ERP revolutionized our operations, streamlining finance and inventory. The cloud-based platform keeps us productive, even remotely.", image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=100&auto=format&fit=crop", name: "Briana Patton", role: "Operations Manager", },
            { text: "Implementing this ERP was smooth and quick. The customizable, user-friendly interface made team training effortless.", image: "https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?q=80&w=100&auto=format&fit=crop", name: "Bilal Ahmed", role: "IT Manager", },
            { text: "The support team is exceptional, guiding us through setup and providing ongoing assistance, ensuring our satisfaction.", image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=100&auto=format&fit=crop", name: "Saman Malik", role: "Customer Support Lead", },
            { text: "This ERP's seamless integration enhanced our business operations and efficiency. Highly recommend for its intuitive interface.", image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=100&auto=format&fit=crop", name: "Omar Raza", role: "CEO", },
            { text: "Its robust features and quick support have transformed our workflow, making us significantly more efficient.", image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=100&auto=format&fit=crop", name: "Zainab Hussain", role: "Project Manager", },
            { text: "The smooth implementation exceeded expectations. It streamlined processes, improving overall business performance.", image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=100&auto=format&fit=crop", name: "Aliza Khan", role: "Business Analyst", },
            { text: "Our business functions improved with a user-friendly design and positive customer feedback.", image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=100&auto=format&fit=crop", name: "Farhan Siddiqui", role: "Marketing Director", },
            { text: "They delivered a solution that exceeded expectations, understanding our needs and enhancing our operations.", image: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=100&auto=format&fit=crop", name: "Sana Sheikh", role: "Sales Manager", },
            { text: "Using this ERP, our online presence and conversions significantly improved, boosting business performance.", image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=100&auto=format&fit=crop", name: "Hassan Ali", role: "E-commerce Manager", },
        ];

        const firstColumn = testimonials.slice(0, 3);
        const secondColumn = testimonials.slice(3, 6);
        const thirdColumn = testimonials.slice(6, 9);

        const TestimonialsDemo = () => {
            return (
                <section className="bg-background w-full h-full text-white relative flex flex-col justify-center items-center py-20 overflow-hidden">
                <div className="container z-10 mx-auto px-4 w-full h-full flex flex-col">
                    <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    transition={{ duration: 0.8, delay: 0.1, ease: [0.16, 1, 0.3, 1] }}
                    viewport={{ once: true }}
                    className="flex flex-col items-center justify-center max-w-[540px] mx-auto mb-10 shrink-0"
                    >
                    <div className="flex justify-center mb-4 mt-8">
                        <div className="border border-white/20 py-1 px-4 rounded-lg text-sm text-gray-300">Testimonials</div>
                    </div>
                    <h2 className="text-3xl lg:text-5xl font-bold tracking-tighter text-center">
                        What our users say
                    </h2>
                    <p className="text-center mt-5 text-gray-400">
                        See what our customers have to say about us.
                    </p>
                    </motion.div>

                    <div className="flex-1 min-h-0 flex justify-center gap-6 [mask-image:linear-gradient(to_bottom,transparent,black_10%,black_90%,transparent)] overflow-hidden">
                        <TestimonialsColumn testimonials={firstColumn} duration={15} />
                        <TestimonialsColumn testimonials={secondColumn} className="hidden md:block" duration={19} />
                        <TestimonialsColumn testimonials={thirdColumn} className="hidden lg:block" duration={17} />
                    </div>
                </div>
                </section>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<TestimonialsDemo />);
        
        document.getElementById('copy-btn').addEventListener('click', () => {
            const btn = document.getElementById('copy-btn');
            fetch('components/ui/testimonials-columns-1.tsx').then(r => r.text()).then(code => {
                navigator.clipboard.writeText(code);
                btn.textContent = 'Copied Component!';
                setTimeout(() => btn.textContent = 'Copy Component Code', 2000);
            }).catch(e => {
                btn.textContent = 'Failed';
            });
        });

    </script>
</body>
</html>
