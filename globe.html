<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Globe — Interaction Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "d3": "https://esm.sh/d3@7.9.0",
        "@/components/ui/wireframe-dotted-globe": "./components/ui/wireframe-dotted-globe.tsx"
      }
    }
    </script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        #actions { position: fixed; top: 20px; left: 20px; display: flex; gap: 15px; z-index: 50; }
        .action-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; cursor: pointer; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease; box-sizing: border-box; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }

    </style>

</head>
<body class="dark bg-zinc-950">
    <div id="actions">
        <a href="index.html" class="action-btn">⌂ Home</a>
        <button id="copy-btn" class="action-btn">Copy Component Code</button>
    </div>
    
    <div id="root" class="w-full min-h-screen text-white bg-black flex flex-col justify-center"></div>

    <script type="text/babel" data-type="module">
        import React, { useEffect, useRef, useState } from "react";
        import { createRoot } from "react-dom/client";
        import * as d3 from "d3";

        function RotatingEarth({ width = 800, height = 600, className = "" }) {
        const canvasRef = useRef(null)
        const [isLoading, setIsLoading] = useState(true)
        const [error, setError] = useState(null)

        useEffect(() => {
            if (!canvasRef.current) return

            const canvas = canvasRef.current
            const context = canvas.getContext("2d")
            if (!context) return

            // Set up responsive dimensions
            const containerWidth = Math.min(width, window.innerWidth - 40)
            const containerHeight = Math.min(height, window.innerHeight - 100)
            const radius = Math.min(containerWidth, containerHeight) / 2.5

            const dpr = window.devicePixelRatio || 1
            canvas.width = containerWidth * dpr
            canvas.height = containerHeight * dpr
            canvas.style.width = `${containerWidth}px`
            canvas.style.height = `${containerHeight}px`
            context.scale(dpr, dpr)

            // Create projection and path generator for Canvas
            const projection = d3
            .geoOrthographic()
            .scale(radius)
            .translate([containerWidth / 2, containerHeight / 2])
            .clipAngle(90)

            const path = d3.geoPath().projection(projection).context(context)

            const pointInPolygon = (point, polygon) => {
            const [x, y] = point
            let inside = false

            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const [xi, yi] = polygon[i]
                const [xj, yj] = polygon[j]

                if (yi > y !== yj > y && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
                inside = !inside
                }
            }

            return inside
            }

            const pointInFeature = (point, feature) => {
            const geometry = feature.geometry

            if (geometry.type === "Polygon") {
                const coordinates = geometry.coordinates
                if (!pointInPolygon(point, coordinates[0])) {
                return false
                }
                for (let i = 1; i < coordinates.length; i++) {
                if (pointInPolygon(point, coordinates[i])) {
                    return false
                }
                }
                return true
            } else if (geometry.type === "MultiPolygon") {
                for (const polygon of geometry.coordinates) {
                if (pointInPolygon(point, polygon[0])) {
                    let inHole = false
                    for (let i = 1; i < polygon.length; i++) {
                    if (pointInPolygon(point, polygon[i])) {
                        inHole = true
                        break
                    }
                    }
                    if (!inHole) {
                    return true
                    }
                }
                }
                return false
            }

            return false
            }

            const generateDotsInPolygon = (feature, dotSpacing = 16) => {
            const dots = []
            const bounds = d3.geoBounds(feature)
            const [[minLng, minLat], [maxLng, maxLat]] = bounds

            // Smaller stepSize = higher density, longer calculation. 0.28 is a fast safe number!
            const stepSize = dotSpacing * 0.15 
            let pointsGenerated = 0

            for (let lng = minLng; lng <= maxLng; lng += stepSize) {
                for (let lat = minLat; lat <= maxLat; lat += stepSize) {
                const point = [lng, lat]
                if (pointInFeature(point, feature)) {
                    dots.push(point)
                    pointsGenerated++
                }
                }
            }
            return dots
            }

            const allDots = []
            let landFeatures

            const render = () => {
            context.clearRect(0, 0, containerWidth, containerHeight)

            const currentScale = projection.scale()
            const scaleFactor = currentScale / radius

            // Draw ocean (globe background)
            context.beginPath()
            context.arc(containerWidth / 2, containerHeight / 2, currentScale, 0, 2 * Math.PI)
            context.fillStyle = "#000000"
            context.fill()
            context.strokeStyle = "#ffffff"
            context.lineWidth = 2 * scaleFactor
            context.stroke()

            if (landFeatures) {
                const graticule = d3.geoGraticule()
                context.beginPath()
                path(graticule())
                context.strokeStyle = "#ffffff"
                context.lineWidth = 1 * scaleFactor
                context.globalAlpha = 0.25
                context.stroke()
                context.globalAlpha = 1

                context.beginPath()
                landFeatures.features.forEach((feature) => {
                path(feature)
                })
                context.strokeStyle = "#ffffff"
                context.lineWidth = 1 * scaleFactor
                context.stroke()

                // Draw halftone dots
                allDots.forEach((dot) => {
                const projected = projection([dot.lng, dot.lat])
                if (
                    projected &&
                    projected[0] >= 0 &&
                    projected[0] <= containerWidth &&
                    projected[1] >= 0 &&
                    projected[1] <= containerHeight
                ) {
                    context.beginPath()
                    context.arc(projected[0], projected[1], 1.2 * scaleFactor, 0, 2 * Math.PI)
                    context.fillStyle = "#999999"
                    context.fill()
                }
                })
            }
            }

            const loadWorldData = async () => {
            try {
                setIsLoading(true)

                const response = await fetch(
                "https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/110m/physical/ne_110m_land.json",
                )
                if (!response.ok) throw new Error("Failed to load land data")

                landFeatures = await response.json()

                landFeatures.features.forEach((feature) => {
                const dots = generateDotsInPolygon(feature, 16)
                dots.forEach(([lng, lat]) => {
                    allDots.push({ lng, lat, visible: true })
                })
                })

                render()
                setIsLoading(false)
            } catch (err) {
                setError("Failed to load land map data")
                setIsLoading(false)
            }
            }

            const rotation = [0, 0]
            let autoRotate = true
            const rotationSpeed = 0.5

            const rotate = () => {
            if (autoRotate) {
                rotation[0] += rotationSpeed
                projection.rotate(rotation)
                render()
            }
            }

            // Auto-rotation timer
            const rotationTimer = d3.timer(rotate)

            const handleMouseDown = (event) => {
            autoRotate = false
            const startX = event.clientX
            const startY = event.clientY
            const startRotation = [...rotation]

            const handleMouseMove = (moveEvent) => {
                const sensitivity = 0.5
                const dx = moveEvent.clientX - startX
                const dy = moveEvent.clientY - startY

                rotation[0] = startRotation[0] + dx * sensitivity
                rotation[1] = startRotation[1] - dy * sensitivity
                rotation[1] = Math.max(-90, Math.min(90, rotation[1]))

                projection.rotate(rotation)
                render()
            }

            const handleMouseUp = () => {
                document.removeEventListener("mousemove", handleMouseMove)
                document.removeEventListener("mouseup", handleMouseUp)

                setTimeout(() => {
                autoRotate = true
                }, 10)
            }

            document.addEventListener("mousemove", handleMouseMove)
            document.addEventListener("mouseup", handleMouseUp)
            }

            const handleWheel = (event) => {
            event.preventDefault()
            const scaleFactor = event.deltaY > 0 ? 0.9 : 1.1
            const newRadius = Math.max(radius * 0.5, Math.min(radius * 3, projection.scale() * scaleFactor))
            projection.scale(newRadius)
            render()
            }

            canvas.addEventListener("mousedown", handleMouseDown)
            canvas.addEventListener("wheel", handleWheel, { passive: false })

            loadWorldData()

            return () => {
            rotationTimer.stop()
            canvas.removeEventListener("mousedown", handleMouseDown)
            canvas.removeEventListener("wheel", handleWheel)
            }
        }, [width, height])

        return (
            <div className={`relative ${className} w-full flex justify-center items-center`}>
            {isLoading && (
                <div className="absolute inset-0 flex items-center justify-center text-white/50 text-sm animate-pulse">
                    Parsing topology... (May take several seconds due to browser limitations directly computing D3 JSON loops)
                </div>
            )}
            <canvas
                ref={canvasRef}
                className="rounded-2xl shadow-xl shadow-white/5"
            />
            <div className="absolute bottom-6 mx-auto text-xs text-white/50 px-2 py-1 rounded-md bg-white/10 backdrop-blur-md">
                Drag to rotate • Scroll to zoom (D3 JSON Topology Parser Engine)
            </div>
            </div>
        )
        }


        function DemoComponent() {
            return (
                <main className="min-h-screen w-full bg-black flex flex-col items-center justify-center p-8 relative">
                    <h1 className="absolute top-10 text-white text-3xl font-mono mb-8 font-semibold tracking-tight">Interactive D3 Topography Globe</h1>
                    <RotatingEarth width={900} height={900} />
                </main>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DemoComponent />);
        
        document.getElementById('copy-btn').addEventListener('click', () => {
            const btn = document.getElementById('copy-btn');
            fetch('components/ui/wireframe-dotted-globe.tsx').then(r => r.text()).then(code => {
                navigator.clipboard.writeText(code);
                btn.textContent = 'Copied Component!';
                setTimeout(() => btn.textContent = 'Copy Component Code', 2000);
            }).catch(e => {
                btn.textContent = 'Failed';
            });
        });

    </script>
</body>
</html>
