<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Marquee — Interaction Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@/lib/utils": "./lib/utils.js",
        "@/components/ui/marquee": "./components/ui/marquee.tsx"
      }
    }
    </script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow-x: hidden; font-family: system-ui, -apple-system, sans-serif; }
        #actions { position: fixed; top: 20px; left: 20px; display: flex; gap: 15px; z-index: 50; }
        .action-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; cursor: pointer; text-decoration: none; backdrop-filter: blur(10px); transition: all 0.3s ease; box-sizing: border-box; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }

        .animate-marquee {
            animation: marquee var(--duration) linear infinite;
        }
        .animate-marquee-vertical {
            animation: marquee-vertical var(--duration) linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-100% - 1.5rem)); }
        }

        @keyframes marquee-vertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(-100% - 1.5rem)); }
        }

        .marquee-container:hover .team-card {
            opacity: 0.3;
            transform: scale(0.95);
        }
        .marquee-container .team-card:hover {
            opacity: 1 !important;
            transform: scale(1.05) !important;
            z-index: 20;
        }
    </style>

    <script type="text/javascript">
        window.cn = function(...classes) {
            return classes.filter(Boolean).join(' ');
        };
    </script>
</head>
<body class="dark bg-zinc-950">
    <div id="actions">
        <a href="index.html" class="action-btn">⌂ Home</a>
        <button id="copy-btn" class="action-btn">Copy Component Code</button>
    </div>
    
    <div id="root" class="w-full min-h-screen text-white bg-zinc-950 flex flex-col justify-center"></div>

    <script type="text/babel" data-type="module">
        import React from "react";
        import { createRoot } from "react-dom/client";
        const cn = window.cn;

        function Marquee({
            className,
            reverse,
            pauseOnHover = false,
            children,
            vertical = false,
            repeat = 4,
            ...props
        }) {
            return (
                <div
                {...props}
                className={cn(
                    "group flex overflow-hidden p-2",
                    {
                    "flex-row": !vertical,
                    "flex-col": vertical,
                    },
                    className,
                )}
                style={{ "--duration": "40s", "--gap": "1.5rem", gap: "var(--gap)", ...props.style }}
                >
                {Array(repeat)
                    .fill(0)
                    .map((_, i) => (
                    <div
                        key={i}
                        className={cn("flex shrink-0 justify-around", {
                        "flex-row": !vertical,
                        "flex-col": vertical,
                        "group-hover:[animation-play-state:paused]": pauseOnHover,
                        })}
                        style={{ 
                            gap: "var(--gap)",
                            animation: vertical 
                                ? `marquee-vertical var(--duration) linear infinite ${reverse ? 'reverse' : 'normal'}` 
                                : `marquee var(--duration) linear infinite ${reverse ? 'reverse' : 'normal'}` 
                        }}
                    >
                        {children}
                    </div>
                    ))}
                </div>
            );
        }

        const teamMembers = [
            { image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=250&auto=format&fit=crop", name: "Patrick Stewart", role: "CEO - Founder", },
            { image: "https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?q=80&w=250&auto=format&fit=crop", name: "Alena Rosser", role: "Director of Content", },
            { image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=250&auto=format&fit=crop", name: "Fletch Skinner", role: "Tech Manager", },
            { image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=250&auto=format&fit=crop", name: "Marc Spector", role: "Director of Content", },
            { image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=250&auto=format&fit=crop", name: "Natalia Skinner", role: "Cnippet Researcher", },
            { image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=250&auto=format&fit=crop", name: "David Kim", role: "Engineering Lead", },
        ];

        function Component() {
            return (
                <section className="relative w-full max-w-[100vw] overflow-hidden py-12 md:py-24 dark:bg-zinc-950">
                <div>
                    <svg
                    className="absolute right-0 bottom-0 text-neutral-200 dark:text-neutral-800 tracking-[-1rem] drop-shadow-md"
                    fill="none" height="154" viewBox="0 0 460 154" width="460" xmlns="http://www.w3.org/2000/svg"
                    >
                    <g clipPath="url(#clip0_494_1104)">
                        <path d="M-87.463 458.432C-102.118 348.092 -77.3418 238.841 -15.0744 188.274C57.4129 129.408 180.708 150.071 351.748 341.128C278.246 -374.233 633.954 380.602 548.123 42.7707" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="40" />
                    </g>
                    </svg>
                </div>

                <div className="relative z-10 mx-auto max-w-7xl">
                    <div className="mx-auto mb-16 flex max-w-5xl flex-col items-center px-6 text-center lg:px-0">
                    <div className="mb-6 flex h-12 w-12 items-center justify-center rounded-xl bg-blue-600 text-white shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-user-star shadow"><path d="M16.051 12.616a1 1 0 0 1 1.909.024l.737 1.452a1 1 0 0 0 .737.535l1.634.256a1 1 0 0 1 .588 1.806l-1.172 1.168a1 1 0 0 0-.282.866l.259 1.613a1 1 0 0 1-1.541 1.134l-1.465-.75a1 1 0 0 0-.912 0l-1.465.75a1 1 0 0 1-1.539-1.133l.258-1.613a1 1 0 0 0-.282-.866l-1.156-1.153a1 1 0 0 1 .572-1.822l1.633-.256a1 1 0 0 0 .737-.535z"/><path d="M8 15H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/></svg>
                    </div>

                    <h1 className="relative mb-4 font-medium text-4xl text-neutral-900 tracking-tight sm:text-5xl dark:text-neutral-100">
                        Creative Cnippet Members
                    </h1>
                    <p className="max-w-2xl text-neutral-600 dark:text-neutral-400">
                        Cnippet connects you with the most advanced tech solutions,
                        empowering seamless communication.
                    </p>
                    </div>

                    <div className="relative w-full">
                    <div className="pointer-events-none absolute top-0 left-0 z-10 h-full w-32 bg-gradient-to-r from-zinc-950 to-transparent" />
                    <div className="pointer-events-none absolute top-0 right-0 z-10 h-full w-32 bg-gradient-to-l from-zinc-950 to-transparent" />

                    <Marquee className="[--gap:1.5rem] marquee-container" pauseOnHover>
                        {teamMembers.map((member) => (
                        <div
                            className="team-card group flex w-64 shrink-0 flex-col cursor-pointer transition-all duration-500 ease-out"
                            key={member.name}
                        >
                            <div className="relative h-[300px] w-full overflow-hidden rounded-2xl bg-neutral-100 dark:bg-neutral-800">
                            <img
                                alt={member.name}
                                className="h-full w-full object-cover grayscale transition-all duration-300 group-hover:grayscale-0"
                                src={member.image}
                            />
                            <div className="absolute bottom-0 w-full bg-neutral-100/90 p-3 dark:bg-neutral-900/90 backdrop-blur-sm">
                                <h3 className="font-semibold text-neutral-900 dark:text-neutral-100">
                                {member.name}
                                </h3>
                                <p className="text-neutral-600 text-sm dark:text-neutral-400">
                                {member.role}
                                </p>
                            </div>
                            </div>
                        </div>
                        ))}
                    </Marquee>
                    </div>

                    <div className="mx-auto mt-20 max-w-3xl px-6 text-center lg:px-0 relative z-20">
                    <p className="mb-8 font-medium text-lg text-neutral-900 leading-relaxed md:text-xl dark:text-neutral-100 italic">
                        "The exceptional support from Cnippet truly impressed us. We
                        suggested an improvement, and their team implemented it with
                        remarkable speed!"
                    </p>
                    <div className="flex flex-col items-center gap-3">
                        <div className="relative h-14 w-14 overflow-hidden rounded-full shadow-lg">
                        <img
                            alt="Natalia Kara"
                            className="h-full w-full object-cover"
                            src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=100&auto=format&fit=crop"
                        />
                        </div>
                        <div className="text-center">
                        <p className="font-semibold text-neutral-900 dark:text-neutral-100">
                            Natalia Kara
                        </p>
                        <p className="text-neutral-600 text-sm dark:text-neutral-400">
                            CTO · Cnippet Collection
                        </p>
                        </div>
                    </div>
                    </div>
                </div>
                </section>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Component />);
        
        document.getElementById('copy-btn').addEventListener('click', () => {
            const btn = document.getElementById('copy-btn');
            fetch('components/ui/team.tsx').then(r => r.text()).then(code => {
                navigator.clipboard.writeText(code);
                btn.textContent = 'Copied Component!';
                setTimeout(() => btn.textContent = 'Copy Component Code', 2000);
            }).catch(e => {
                btn.textContent = 'Failed';
            });
        });

    </script>
</body>
</html>
