<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Section - Interactive Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        border: "hsl(var(--border))",
                        secondary: "hsl(var(--secondary))",
                        primary: "hsl(var(--primary))",
                        card: "hsl(var(--card))",
                        "card-foreground": "hsl(var(--card-foreground))"
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --background: 0 0% 0%;
            --foreground: 0 0% 98%;
            --border: 0 0% 14.9%;
            --secondary: 0 0% 14.9%;
            --primary: 217.2 91.2% 59.8%;
            --card: 0 0% 10%;
            --card-foreground: 0 0% 98%;
        }
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; margin: 0; }
        
        .interactive-nav {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 50;
            display: flex;
            gap: 1rem;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.1?deps=react@18.2.0,react-dom@18.2.0",
            "clsx": "https://esm.sh/clsx",
            "tailwind-merge": "https://esm.sh/tailwind-merge",
            "@tsparticles/engine": "https://esm.sh/@tsparticles/engine@3.3.0?deps=react@18.2.0,react-dom@18.2.0",
            "@tsparticles/slim": "https://esm.sh/@tsparticles/slim@3.3.0?deps=react@18.2.0,react-dom@18.2.0",
            "@tsparticles/react": "https://esm.sh/@tsparticles/react@3.0.0?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fallback NumberFlow for babel standalone if ESM map fails -->
    <script src="https://unpkg.com/@number-flow/react@0.4.3/dist/index.umd.js"></script>
</head>
<body class="antialiased w-full min-h-screen text-white">

<div class="interactive-nav">
    <a href="/" class="nav-btn">← Back to Hub</a>
</div>

<div id="root" class="w-full h-full min-h-screen"></div>

<script type="text/babel" data-type="module">
import React, { useState, useCallback, useRef, useEffect, forwardRef, useMemo, useId, useImperativeHandle } from "react";
import { createRoot } from "react-dom/client";
import { clsx } from "clsx";
import { twMerge } from "tailwind-merge";
import { motion, AnimatePresence } from "framer-motion";
import Particles, { initParticlesEngine } from "@tsparticles/react";
import { loadSlim } from "@tsparticles/slim";

function cn(...inputs) { return twMerge(clsx(inputs)); }

// NumberFlow shim
const NumberFlow = window.NumberFlow || (({ value }) => <span>{value}</span>);

// Timeline Content shim
const TimelineContent = ({ children, customVariants, animationNum = 0, as = "div", className, timelineRef, ...props }) => {
  const Comp = motion[as] || motion.div;
  return (
    <Comp
      initial="hidden"
      whileInView="visible"
      viewport={{ root: timelineRef, once: true }}
      custom={animationNum}
      variants={customVariants}
      className={className}
      {...props}
    >
      {children}
    </Comp>
  );
};

// Card shim
const Card = forwardRef(({ className, ...props }, ref) => (
  <div ref={ref} className={cn("rounded-lg border bg-card text-card-foreground shadow-sm", className)} {...props} />
));
const CardHeader = forwardRef(({ className, ...props }, ref) => (
  <div ref={ref} className={cn("flex flex-col space-y-1.5 p-6", className)} {...props} />
));
const CardContent = forwardRef(({ className, ...props }, ref) => (
  <div ref={ref} className={cn("p-6 pt-0", className)} {...props} />
));

// Sparkles
function SparklesComp({
  className,
  size = 1,
  minSize = null,
  density = 800,
  speed = 1,
  minSpeed = null,
  opacity = 1,
  opacitySpeed = 3,
  minOpacity = null,
  color = "#FFFFFF",
  background = "transparent",
  options = {},
}) {
  const [isReady, setIsReady] = useState(false);

  useEffect(() => {
    initParticlesEngine(async (engine) => {
      await loadSlim(engine);
    }).then(() => {
      setIsReady(true);
    });
  }, []);

  const id = useId();

  const defaultOptions = {
    background: { color: { value: background } },
    fullScreen: { enable: false, zIndex: 1 },
    fpsLimit: 120,
    particles: {
      color: { value: color },
      move: { enable: true, direction: "none", speed: { min: minSpeed || speed / 10, max: speed }, straight: false },
      number: { value: density },
      opacity: { value: { min: minOpacity || opacity / 10, max: opacity }, animation: { enable: true, sync: false, speed: opacitySpeed } },
      size: { value: { min: minSize || size / 2.5, max: size } },
    },
    detectRetina: true,
  };

  return isReady && <Particles id={id} options={{ ...defaultOptions, ...options }} className={className} />;
}

// VerticalCutReveal
const VerticalCutReveal = forwardRef(
  ({ children, reverse = false, transition = { type: "spring", stiffness: 190, damping: 22 }, splitBy = "words", staggerDuration = 0.2, staggerFrom = "first", containerClassName, wordLevelClassName, elementLevelClassName, onClick, onStart, onComplete, autoStart = true, ...props }, ref) => {
    const containerRef = useRef(null);
    const text = typeof children === "string" ? children : children?.toString() || "";
    const [isAnimating, setIsAnimating] = useState(false);

    const splitIntoCharacters = (text) => {
      if (typeof Intl !== "undefined" && "Segmenter" in Intl) {
        const segmenter = new Intl.Segmenter("en", { granularity: "grapheme" });
        return Array.from(segmenter.segment(text), ({ segment }) => segment);
      }
      return Array.from(text);
    };

    const elements = useMemo(() => {
      const words = text.split(" ");
      if (splitBy === "characters") {
        return words.map((word, i) => ({ characters: splitIntoCharacters(word), needsSpace: i !== words.length - 1 }));
      }
      return splitBy === "words" ? text.split(" ") : splitBy === "lines" ? text.split("\n") : text.split(splitBy);
    }, [text, splitBy]);

    const getStaggerDelay = useCallback((index) => {
        const total = splitBy === "characters" ? elements.reduce((acc, word) => acc + (typeof word === "string" ? 1 : word.characters.length + (word.needsSpace ? 1 : 0)), 0) : elements.length;
        if (staggerFrom === "first") return index * staggerDuration;
        return index * staggerDuration;
    }, [elements.length, staggerFrom, staggerDuration]);

    const startAnimation = useCallback(() => { setIsAnimating(true); }, []);

    useImperativeHandle(ref, () => ({ startAnimation, reset: () => setIsAnimating(false) }));

    useEffect(() => { if (autoStart) startAnimation(); }, [autoStart, startAnimation]);

    const variants = {
      hidden: { y: reverse ? "-100%" : "100%" },
      visible: (i) => ({ y: 0, transition: { ...transition, delay: (transition?.delay || 0) + getStaggerDelay(i) } }),
    };

    return (
      <span className={cn(containerClassName, "flex flex-wrap whitespace-pre-wrap", splitBy === "lines" && "flex-col")} onClick={onClick} ref={containerRef} {...props}>
        <span className="sr-only">{text}</span>
        {(splitBy === "characters" ? elements : elements.map((el, i) => ({ characters: [el], needsSpace: i !== elements.length - 1 }))).map((wordObj, wordIndex, array) => {
          const previousCharsCount = array.slice(0, wordIndex).reduce((sum, word) => sum + word.characters.length, 0);
          return (
            <span key={wordIndex} aria-hidden="true" className={cn("inline-flex overflow-hidden", wordLevelClassName)}>
              {wordObj.characters.map((char, charIndex) => (
                <span className={cn(elementLevelClassName, "whitespace-pre-wrap relative")} key={charIndex}>
                  <motion.span custom={previousCharsCount + charIndex} initial="hidden" animate={isAnimating ? "visible" : "hidden"} variants={variants} className="inline-block">{char}</motion.span>
                </span>
              ))}
              {wordObj.needsSpace && <span>&nbsp;</span>}
            </span>
          );
        })}
      </span>
    );
  }
);

// ---------------------------
// PricingSection4
// ---------------------------
const plans = [
  { name: "Starter", description: "Great for small businesses and startups looking to get started with AI", price: 12, yearlyPrice: 99, buttonText: "Get started", buttonVariant: "outline", includes: ["Free includes:", "Unlimited Cards", "Custom background & stickers", "2-factor authentication"] },
  { name: "Business", description: "Best value for growing businesses that need more advanced features", price: 48, yearlyPrice: 399, buttonText: "Get started", buttonVariant: "default", popular: true, includes: ["Everything in Starter, plus:", "Advanced checklists", "Custom fields", "Serverless functions"] },
  { name: "Enterprise", description: "Advanced plan with enhanced security and unlimited access for large teams", price: 96, yearlyPrice: 899, buttonText: "Get started", buttonVariant: "outline", includes: ["Everything in Business, plus:", "Multi-board management", "Multi-board guest", "Attachment permissions"] },
];

const PricingSwitch = ({ onSwitch }) => {
  const [selected, setSelected] = useState("0");
  const handleSwitch = (value) => { setSelected(value); onSwitch(value); };
  return (
    <div className="flex justify-center">
      <div className="relative z-10 mx-auto flex w-fit rounded-full bg-neutral-900 border border-gray-700 p-1">
        <button onClick={() => handleSwitch("0")} className={cn("relative z-10 w-fit h-10 rounded-full sm:px-6 px-3 sm:py-2 py-1 font-medium transition-colors", selected === "0" ? "text-white" : "text-gray-200")}>
          {selected === "0" && <motion.span layoutId={"switch"} className="absolute top-0 left-0 h-10 w-full rounded-full border-4 shadow-sm shadow-blue-600 border-blue-600 bg-gradient-to-t from-blue-500 to-blue-600" transition={{ type: "spring", stiffness: 500, damping: 30 }} />}
          <span className="relative">Monthly</span>
        </button>
        <button onClick={() => handleSwitch("1")} className={cn("relative z-10 w-fit h-10 flex-shrink-0 rounded-full sm:px-6 px-3 sm:py-2 py-1 font-medium transition-colors", selected === "1" ? "text-white" : "text-gray-200")}>
          {selected === "1" && <motion.span layoutId={"switch"} className="absolute top-0 left-0 h-10 w-full rounded-full border-4 shadow-sm shadow-blue-600 border-blue-600 bg-gradient-to-t from-blue-500 to-blue-600" transition={{ type: "spring", stiffness: 500, damping: 30 }} />}
          <span className="relative flex items-center gap-2">Yearly</span>
        </button>
      </div>
    </div>
  );
};

export default function PricingSection6() {
  const [isYearly, setIsYearly] = useState(false);
  const pricingRef = useRef(null);

  const revealVariants = {
    visible: (i) => ({ y: 0, opacity: 1, filter: "blur(0px)", transition: { delay: i * 0.4, duration: 0.5 } }),
    hidden: { filter: "blur(10px)", y: -20, opacity: 0 },
  };

  const togglePricingPeriod = (value) => setIsYearly(parseInt(value) === 1);

  return (
    <div className="min-h-screen mx-auto relative bg-black overflow-x-hidden" ref={pricingRef}>
      <TimelineContent animationNum={4} timelineRef={pricingRef} customVariants={revealVariants} className="absolute top-0 h-96 w-screen overflow-hidden [mask-image:radial-gradient(50%_50%,white,transparent)]">
        <div className="absolute bottom-0 left-0 right-0 top-0 bg-[linear-gradient(to_right,#ffffff2c_1px,transparent_1px),linear-gradient(to_bottom,#3a3a3a01_1px,transparent_1px)] bg-[size:70px_80px]"></div>
        <SparklesComp density={1800} direction="bottom" speed={1} color="#FFFFFF" className="absolute inset-x-0 bottom-0 h-full w-full [mask-image:radial-gradient(50%_50%,white,transparent_85%)]" />
      </TimelineContent>

      <TimelineContent animationNum={5} timelineRef={pricingRef} customVariants={revealVariants} className="absolute left-0 top-[-114px] w-full h-[113.625vh] flex flex-col items-start justify-start content-start flex-none flex-nowrap gap-2.5 overflow-hidden p-0 z-0 opacity-40">
        <div className="framer-1i5axl2">
          <div className="absolute left-[-568px] right-[-568px] top-0 h-[2053px] flex-none rounded-full" style={{ border: "200px solid #3131f5", filter: "blur(92px)" }}></div>
        </div>
      </TimelineContent>

      <article className="text-center mb-6 pt-32 max-w-3xl mx-auto space-y-2 relative z-50">
        <h2 className="text-4xl font-medium text-white mb-6">
          <VerticalCutReveal splitBy="words" staggerDuration={0.15} staggerFrom="first" reverse={true} containerClassName="justify-center">
            Plans that work best for you
          </VerticalCutReveal>
        </h2>
        <TimelineContent as="p" animationNum={0} timelineRef={pricingRef} customVariants={revealVariants} className="text-gray-400 mb-8 max-w-lg mx-auto">
          Trusted by millions, We help teams all around the world, Explore which option is right for you.
        </TimelineContent>
        <TimelineContent as="div" animationNum={1} timelineRef={pricingRef} customVariants={revealVariants}>
          <PricingSwitch onSwitch={togglePricingPeriod} />
        </TimelineContent>
      </article>

      <div className="absolute top-0 left-[10%] right-[10%] w-[80%] h-full z-0" style={{ backgroundImage: `radial-gradient(circle at center, #206ce8 0%, transparent 70%)`, opacity: 0.6, mixBlendMode: "multiply" }} />

      <div className="grid md:grid-cols-3 max-w-5xl gap-4 py-16 mx-auto relative z-50 px-4">
        {plans.map((plan, index) => (
          <TimelineContent key={plan.name} as="div" animationNum={2 + index} timelineRef={pricingRef} customVariants={revealVariants}>
            <Card className={`relative text-white border-neutral-800 h-full ${plan.popular ? "bg-gradient-to-r from-neutral-900 via-neutral-800 to-neutral-900 shadow-[0px_-13px_100px_-20px_#206ce8] z-20 scale-105" : "bg-gradient-to-r from-neutral-900 via-neutral-800 to-neutral-900 z-10"}`}>
              <CardHeader className="text-left">
                <div className="flex justify-between"><h3 className="text-3xl mb-2">{plan.name}</h3></div>
                <div className="flex items-baseline mb-4">
                  <span className="text-4xl font-semibold">$ <NumberFlow value={isYearly ? plan.yearlyPrice : plan.price} className="text-4xl font-semibold inline-block" /></span>
                  <span className="text-gray-400 ml-1">/{isYearly ? "year" : "month"}</span>
                </div>
                <p className="text-sm text-gray-400 mb-4 h-10">{plan.description}</p>
              </CardHeader>
              <CardContent className="pt-0">
                <button className={`w-full mb-6 p-3 font-semibold text-lg rounded-xl transition hover:scale-105 active:scale-95 ${plan.popular ? "bg-gradient-to-t from-blue-600 to-blue-500 shadow-lg shadow-blue-900/50 border border-blue-400/50 text-white" : "bg-gradient-to-t from-neutral-800 to-neutral-700 shadow-lg border border-neutral-600 text-white hover:bg-neutral-700"}`}>
                  {plan.buttonText}
                </button>
                <div className="space-y-3 pt-6 border-t border-neutral-800">
                  <h4 className="font-medium text-sm text-gray-200 mb-3">{plan.includes[0]}</h4>
                  <ul className="space-y-3">
                    {plan.includes.slice(1).map((feature, idx) => (
                      <li key={idx} className="flex items-center gap-3">
                        <span className="h-1.5 w-1.5 bg-blue-500 rounded-full"></span>
                        <span className="text-sm text-gray-300">{feature}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              </CardContent>
            </Card>
          </TimelineContent>
        ))}
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(<PricingSection6 />);
</script>
</body>
</html>
